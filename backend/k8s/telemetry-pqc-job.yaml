apiVersion: batch/v1
kind: Job
metadata:
  name: aura-telemetry-pqc-job
  namespace: aura
  labels:
    app: aura-telemetry-pqc-job
    component: telemetry-producer
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: aura-telemetry-pqc-job
        component: telemetry-producer
    spec:
      restartPolicy: Never
      containers:
        - name: aura-telemetry-pqc
          image: aurav2registry17722.azurecr.io/aura-backend:v1
          imagePullPolicy: IfNotPresent
          command: ["node", "streaming/telemetryProducer.js", "pqc"]
          envFrom:
            - configMapRef:
                name: aura-config
            - secretRef:
                name: aura-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"