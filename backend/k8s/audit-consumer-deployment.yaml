apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-audit-consumer
  namespace: aura
  labels:
    app: aura-audit-consumer
    component: audit-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-audit-consumer
  template:
    metadata:
      labels:
        app: aura-audit-consumer
        component: audit-consumer
    spec:
      containers:
        - name: aura-audit-consumer
          image: aura-backend:local
          imagePullPolicy: IfNotPresent
          command: ["node", "streaming/auditConsumer.js"]
          envFrom:
            - configMapRef:
                name: aura-config
            - secretRef:
                name: aura-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"