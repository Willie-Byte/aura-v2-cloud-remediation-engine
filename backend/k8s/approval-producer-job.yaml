apiVersion: batch/v1
kind: Job
metadata:
  name: aura-approval-producer-job
  namespace: aura
  labels:
    app: aura-approval-producer-job
    component: approval-producer
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: aura-approval-producer-job
        component: approval-producer
    spec:
      restartPolicy: Never
      containers:
        - name: aura-approval-producer
          image: aurav2registry17722.azurecr.io/aura-backend:v2-ebpf
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              node streaming/approvalDecisionProducer.js \
                "${DECISION}" \
                "${REMEDIATION_ID}" \
                "${THREAT_ID}" \
                "${APPROVAL_ID}" \
                "${TARGET_RESOURCE}" \
                "${RESOURCE_TYPE}" \
                "${CLOUD_PROVIDER}" \
                "${ISSUE_TYPE}" \
                "${ACTION}" \
                "${RISK_LEVEL}"
          envFrom:
            - configMapRef:
                name: aura-config
            - configMapRef:
                name: aura-approval-run
            - secretRef:
                name: aura-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"